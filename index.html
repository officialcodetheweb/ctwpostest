<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Multi-User Chat Test</title>
  <!-- 1. Include the Realtime Service Library -->
  <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 450px;
      height: 90vh;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #2ecc71;
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-status-dot {
      width: 10px;
      height: 10px;
      background-color: #ffffff;
      border-radius: 50%;
    }

    .chat-header-info h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .chat-header-info p {
      font-size: 12px;
      opacity: 0.8;
    }

    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background-color: #f7f9fa;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
      position: relative;
    }

    /* Style for messages from other people */
    .message.received {
      background-color: #e9ecef;
      color: #212529;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    /* Style for messages sent by you */
    .message.sent {
      background-color: #2ecc71;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message-time {
      font-size: 9px;
      margin-top: 4px;
      text-align: right;
      opacity: 0.7;
    }

    .chat-input-area {
      padding: 12px;
      background: white;
      border-top: 1px solid #e9ecef;
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ced4da;
      border-radius: 24px;
      outline: none;
      font-size: 14px;
    }

    .send-btn {
      background-color: #2ecc71;
      color: white;
      border: none;
      padding: 0 18px;
      border-radius: 24px;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      <div class="chat-status-dot"></div>
      <div class="chat-header-info">
        <h2>Live Test Room</h2>
        <p id="connection-status">Connecting...</p>
      </div>
    </div>

    <div class="chat-messages" id="chat-messages"></div>

    <form class="chat-input-area" id="chat-form">
      <input type="text" id="chat-input" class="chat-input" placeholder="Type a message..." autocomplete="off" required>
      <button type="submit" class="send-btn">Send</button>
    </form>
  </div>

  <script>
    // 2. Assign a unique ID to this browser tab so it knows who sent what
    const myClientId = 'user_' + Math.random().toString(36).substr(2, 9);

    // 3. Paste your free Ably API Key here:
    const ABLY_KEY = 'LLfRjA.j4Y1GQ:JoO4hvLPV6GcaOJd7w6IS6zcWJX9BgEOShVZn2kW6b8'; 

    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');
    const statusText = document.getElementById('connection-status');

    // Initialize Connection
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('test-chat-room');

    ably.connection.on('connected', () => {
      statusText.textContent = "Live & Connected";
    });

    ably.connection.on('failed', () => {
      statusText.textContent = "Connection failed";
    });

    // 4. LISTEN FOR INCOMING MESSAGES FROM ANYONE
    channel.subscribe('message', (incoming) => {
      const data = incoming.data;
      
      // If the message came from this tab, style it as "sent", otherwise "received"
      const messageType = (data.senderId === myClientId) ? 'sent' : 'received';
      
      appendMessage(data.text, messageType);
    });

    function appendMessage(text, type) {
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message', type);
      const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      messageDiv.innerHTML = `${escapeHTML(text)} <div class="message-time">${timeStr}</div>`;
      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }

    // 5. SEND MESSAGE TO THE SERVER
    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = chatInput.value.trim();
      
      if (text) {
        // Publish to everyone subscribed to the channel
        channel.publish('message', {
          text: text,
          senderId: myClientId
        });
        chatInput.value = '';
      }
    });
  </script>
</body>
</html>
