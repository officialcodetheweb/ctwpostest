<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Test Messenger</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 450px;
      height: 90vh;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: #007bff;
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-status-dot {
      width: 10px;
      height: 10px;
      background-color: #2ecc71;
      border-radius: 50%;
      display: inline-block;
    }

    .chat-header-info h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .chat-header-info p {
      font-size: 12px;
      opacity: 0.8;
    }

    /* Message Area */
    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background-color: #f7f9fa;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .message.received {
      background-color: #e9ecef;
      color: #212529;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.sent {
      background-color: #007bff;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message-time {
      font-size: 10px;
      margin-top: 4px;
      text-align: right;
      opacity: 0.7;
    }

    /* Input Area */
    .chat-input-area {
      padding: 12px;
      background: white;
      border-top: 1px solid #e9ecef;
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ced4da;
      border-radius: 24px;
      outline: none;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .chat-input:focus {
      border-color: #007bff;
    }

    .send-btn {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 0 18px;
      border-radius: 24px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: background-color 0.2s;
    }

    .send-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <!-- Header -->
    <div class="chat-header">
      <div class="chat-status-dot"></div>
      <div class="chat-header-info">
        <h2>Server Test Client</h2>
        <p id="connection-status">Running Mock Session</p>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages">
      <div class="message received">
        Hello! This is a static test interface. 
        <div class="message-time">Just now</div>
      </div>
      <div class="message received">
        Type a message below to test the message rendering and auto-scroll.
        <div class="message-time">Just now</div>
      </div>
    </div>

    <!-- Input -->
    <form class="chat-input-area" id="chat-form">
      <input type="text" id="chat-input" class="chat-input" placeholder="Type a message..." autocomplete="off" required>
      <button type="submit" class="send-btn">Send</button>
    </form>
  </div>

  <script>
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');
    const statusText = document.getElementById('connection-status');

    // --- FOR LIVE SERVER TESTING ---
    // If you eventually build a WebSocket server (e.g., using Node.js, Socket.io, or Go), 
    // uncomment the block below and replace with your server's address:
    /*
    const socket = new WebSocket('wss://your-websocket-server-url.com');

    socket.addEventListener('open', () => {
      statusText.textContent = "Connected to Live Server";
    });

    socket.addEventListener('message', (event) => {
      const data = JSON.parse(event.data);
      appendMessage(data.text, 'received');
    });
    */

    // Helper to format time
    function getFormattedTime() {
      const now = new Date();
      return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Append a message to the chat container
    function appendMessage(text, type) {
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message', type);
      
      const timeStr = getFormattedTime();
      messageDiv.innerHTML = `${escapeHTML(text)} <div class="message-time">${timeStr}</div>`;
      
      chatMessages.appendChild(messageDiv);
      
      // Auto-scroll to the bottom
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Basic HTML escaping to prevent XSS
    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }

    // Handle sending message
    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const messageText = chatInput.value.trim();
      
      if (messageText) {
        // 1. Add user's message to the UI
        appendMessage(messageText, 'sent');
        chatInput.value = '';

        // --- FOR LIVE SERVER TESTING ---
        // If using WebSockets, send the message to your backend:
        /*
        if (socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify({ text: messageText }));
        }
        */

        // 2. Local Mock auto-reply (Remove this when connecting your actual backend)
        setTimeout(() => {
          appendMessage(`Echo: "${messageText}"`, 'received');
        }, 800);
      }
    });
  </script>
</body>
</html>
