<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CTWchat - Full Screen Realtime Messenger</title>
  <!-- Ably Core SDK -->
  <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    /* Responsive Full-Screen Foundation */
    html, body { height: 100%; width: 100%; background: #f7fafc; overflow: hidden; }
    body { display: flex; justify-content: center; align-items: center; }
    
    .app-window { width: 100vw; height: 100vh; background: #ffffff; display: flex; flex-direction: column; position: relative; }
    
    /* Onboarding Screen */
    .auth-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; z-index: 20; transition: all 0.4s ease; }
    .auth-screen.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
    .brand-logo { text-align: center; margin-top: 40px; }
    .brand-logo h1 { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: #666; margin-bottom: 8px; letter-spacing: 0.5px; }
    .form-input { width: 100%; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: #667eea; }
    
    /* Diagnostics Console */
    .debug-console { background: #1a202c; color: #cbd5e0; padding: 14px; border-radius: 10px; font-family: monospace; font-size: 11px; max-height: 140px; overflow-y: auto; margin-top: 15px; }
    .debug-entry { margin-bottom: 4px; border-bottom: 1px solid #2d3748; padding-bottom: 4px; }
    
    .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3); transition: opacity 0.2s; }
    .btn-primary:active { opacity: 0.9; }

    /* Navigation Header */
    .app-tabs { display: flex; background: #edf2f7; border-bottom: 1px solid #e2e8f0; padding-top: env(safe-area-inset-top); }
    .tab-btn { flex: 1; padding: 18px 10px; background: none; border: none; font-weight: 600; color: #4a5568; cursor: pointer; font-size: 15px; text-align: center; }
    .tab-btn.active { background: white; color: #667eea; border-bottom: 3px solid #667eea; }

    /* Unified View Panel Layouts */
    .view-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; height: calc(100vh - 59px); }
    .view-panel.active { display: flex; }

    /* Friends Directory */
    .friends-list { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .friend-item { display: flex; align-items: center; gap: 16px; padding: 16px; background: #f7fafc; border-radius: 14px; cursor: pointer; border: 1px solid #e2e8f0; transition: background 0.2s; }
    .friend-item:hover { background: #edf2f7; }
    .friend-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-weight: bold; font-size: 18px; text-transform: uppercase; }
    .friend-info h4 { font-size: 16px; font-weight: 600; color: #2d3748; }
    .friend-info p { font-size: 13px; color: #718096; margin-top: 2px; }

    /* Dynamic Profile Setup & Management */
    .profile-panel { padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
    .profile-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .profile-heading { font-size: 18px; font-weight: 700; color: #2d3748; margin-bottom: 16px; }

    /* Messenger System Layout */
    .chat-header { background: #ffffff; padding: 16px 20px; border-bottom: 1px solid #edf2f7; display: flex; align-items: center; gap: 14px; }
    .chat-messages { flex: 1; padding: 20px; background: #f8fafc; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
    
    .msg-block { display: flex; flex-direction: column; max-width: 80%; }
    .msg-block.sent { align-self: flex-end; }
    .msg-block.received { align-self: flex-start; }
    .msg-text { padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-break: break-word; position: relative; }
    .sent .msg-text { background: #667eea; color: white; border-bottom-right-radius: 4px; }
    .received .msg-text { background: #edf2f7; color: #2d3748; border-bottom-left-radius: 4px; }
    .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }

    .chat-input-container { padding: 16px; background: white; border-top: 1px solid #edf2f7; display: flex; gap: 12px; padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
    .message-input { flex: 1; padding: 14px 20px; border: 1px solid #e2e8f0; border-radius: 24px; outline: none; font-size: 15px; background: #f7fafc; }
    .message-input:focus { background: #fff; border-color: #667eea; }
    .btn-send { background: #667eea; color: white; border: none; width: 46px; height: 46px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .btn-send:active { background: #764ba2; }
  </style>
</head>
<body>

  <div class="app-window">
    
    <!-- SYSTEM CONFIGURATION ENTRY WINDOW -->
    <div class="auth-screen" id="auth-screen">
      <div class="brand-logo">
        <h1>CTWchat</h1>
        <p>Live Scalable Connection Sandbox</p>
      </div>
      
      <form id="auth-form">
        <div class="form-group">
          <label for="reg-username">Display Name</label>
          <input type="text" id="reg-username" class="form-input" placeholder="Enter name..." required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="reg-email">Email Address (Unique Identifier)</label>
          <input type="email" id="reg-email" class="form-input" placeholder="name@domain.com" required autocomplete="off">
        </div>
        <button type="submit" class="btn-primary">Initialize Core Network</button>
      </form>

      <div>
        <label style="font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px;">Live Network Logs</label>
        <div class="debug-console" id="debug-log-console">
          <div class="debug-entry">[System] System standing by. Configure profile variables to load network core...</div>
        </div>
      </div>
    </div>

    <!-- RESPONSIVE NAV HEADER SYSTEM -->
    <div class="app-tabs">
      <button class="tab-btn active" onclick="switchView('friends-view')">Friends</button>
      <button class="tab-btn" id="active-chat-tab" onclick="switchView('chat-view')">Chat</button>
      <button class="tab-btn" onclick="switchView('profile-view')">Profile</button>
    </div>

    <!-- ELEMENT PANELS -->
    <!-- VIEW 1: DISCOVERY FRAME -->
    <div id="friends-view" class="view-panel active">
      <div class="friends-list" id="friends-list-container">
        <div style="text-align:center; color:#718096; margin-top:60px; font-size:15px;">
          Synchronizing connection tables...
        </div>
      </div>
    </div>

    <!-- VIEW 2: DIALOG MESSENGER -->
    <div id="chat-view" class="view-panel">
      <div class="chat-header">
        <div class="friend-avatar" id="active-chat-avatar" style="width:38px; height:38px; font-size:14px; display:none;"></div>
        <div>
          <h4 id="active-chat-title">Select a connection to exchange text</h4>
          <span id="active-chat-email" style="font-size:12px; color:#718096;"></span>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages-container"></div>
      <form class="chat-input-container" id="chat-form">
        <input type="text" id="chat-input" class="message-input" placeholder="Write message string..." autocomplete="off" disabled>
        <button type="submit" class="btn-send" id="btn-send" disabled>➔</button>
      </form>
    </div>

    <!-- VIEW 3: USER MANAGED PROFILE EDITOR -->
    <div id="profile-view" class="view-panel">
      <div class="profile-panel">
        
        <div class="profile-card">
          <div class="profile-heading">Edit Profile Settings</div>
          <form id="profile-edit-form">
            <div class="form-group">
              <label for="edit-username">Update Display Name</label>
              <input type="text" id="edit-username" class="form-input" required autocomplete="off">
            </div>
            <div class="form-group">
              <label for="edit-email">Update Identity Email (Will Reset Session)</label>
              <input type="email" id="edit-email" class="form-input" required autocomplete="off">
            </div>
            <button type="submit" class="btn-primary" style="padding: 12px;">Save Profile Changes</button>
          </form>
        </div>

        <div class="profile-card">
          <div class="profile-heading">Data & Systems</div>
          <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button class="btn-primary" style="padding:12px; font-size:13px; background:#edf2f7; color:#4a5568; box-shadow:none;" onclick="exportChatBackup()">Export Chats</button>
            <label for="import-file-input" class="btn-primary" style="padding:12px; font-size:13px; background:#edf2f7; color:#4a5568; box-shadow:none; text-align:center; cursor:pointer;">Import Backup</label>
            <input type="file" id="import-file-input" accept=".json" style="display:none;" onchange="importChatBackup(event)">
          </div>
          <button style="color:#e53e3e; font-weight:600; background:none; border:none; cursor:pointer; font-size:14px; text-align:left;" onclick="wipeSessionData()">Reset Storage & Logout</button>
        </div>

      </div>
    </div>

  </div>

  <script>
    // System Constants and Registry State Arrays
   const ably = new Ably.Realtime({
  key: "YOUR_ABLY_API_KEY", // Or token/authUrl
  clientId: "unique-user-id-or-username" // <-- THIS MUST BE PRESENT
});
    let localProfile = JSON.parse(localStorage.getItem('ctw_profile')) || null;
    let chatRegistry = JSON.parse(localStorage.getItem('ctw_history')) || {}; 
    let activePeer = null;

    const authScreen = document.getElementById('auth-screen');
    const authForm = document.getElementById('auth-form');
    const profileEditForm = document.getElementById('profile-edit-form');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages-container');
    const friendsContainer = document.getElementById('friends-list-container');
    const consoleLogs = document.getElementById('debug-log-console');

    // Activity Stream Console Logger
    function logger(text) {
      const entry = document.createElement('div');
      entry.className = 'debug-entry';
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
      consoleLogs.appendChild(entry);
      consoleLogs.scrollTop = consoleLogs.scrollHeight;
    }

    // Instantiating Network Layer Engines
    logger("Spinning up clustered socket engine...");
    const ably = new Ably.Realtime({ key: ABLY_KEY });
    const syncChannel = ably.channels.get('ctw-presence-room');

    ably.connection.on('connected', () => {
      logger("Connection to Ably Cloud established successfully.");
      bootstrapSessionCheck();
    });

    // Handle Authentication Submission
    authForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const username = document.getElementById('reg-username').value.trim();
      const email = document.getElementById('reg-email').value.trim().toLowerCase();

      if (username && email) {
        localProfile = { username, email };
        localStorage.setItem('ctw_profile', JSON.stringify(localProfile));
        bootstrapSessionCheck();
      }
    });

    // Handle Active Profile Updates
    profileEditForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const nextUsername = document.getElementById('edit-username').value.trim();
      const nextEmail = document.getElementById('edit-email').value.trim().toLowerCase();

      if (!localProfile) return;

      // If key architecture identity shifts, dump routing layers to preserve data accuracy
      if (nextEmail !== localProfile.email) {
        alert("Email changed. System must re-authenticate structural encryption paths.");
        localProfile = { username: nextUsername, email: nextEmail };
        localStorage.setItem('ctw_profile', JSON.stringify(localProfile));
        window.location.reload();
        return;
      }

      localProfile.username = nextUsername;
      localStorage.setItem('ctw_profile', JSON.stringify(localProfile));

      // Push real-time profile mutation updates cleanly up to Ably Roster System
      syncChannel.presence.update(localProfile, (err) => {
        if (err) alert("Failed to propagate profile metadata edits: " + err.message);
        else alert("Profile configuration saved and updated across live nodes!");
      });
    });

    function bootstrapSessionCheck() {
      if (!localProfile || ably.connection.state !== 'connected') return;

      authScreen.classList.add('hidden');
      
      // Seed profile fields inside settings interface
      document.getElementById('edit-username').value = localProfile.username;
      document.getElementById('edit-email').value = localProfile.email;

      // Synchronize state entries into remote table pools
      syncChannel.presence.enter(localProfile, (err) => {
        if(err) logger("Identity allocation mapping failed: " + err.message);
        else logger("System profile published cleanly into live global framework.");
      });

      syncChannel.presence.subscribe(['enter', 'present', 'update', 'leave'], () => {
        fetchOnlineRoster();
      });

      fetchOnlineRoster();
    }

    // Capture Realtime Handshakes directly via Presence State Tables
    function fetchOnlineRoster() {
      syncChannel.presence.get((err, members) => {
        if(err) return;

        friendsContainer.innerHTML = '';
        let count = 0;

        members.forEach(member => {
          const profile = member.data;
          if (!profile || !localProfile || profile.email === localProfile.email) return;

          count++;
          const initials = profile.username.substring(0,2);
          const row = document.createElement('div');
          row.className = 'friend-item';
          row.onclick = () => initiateTargetChat(profile);
          row.innerHTML = `
            <div class="friend-avatar">${initials}</div>
            <div class="friend-info">
              <h4>${escapeHTML(profile.username)}</h4>
              <p>${escapeHTML(profile.email)}</p>
            </div>
          `;
          friendsContainer.appendChild(row);
        });

        if (count === 0) {
          friendsContainer.innerHTML = `
            <div style="text-align:center; color:#718096; margin-top:60px; font-size:15px; padding: 0 20px;">
              No other active endpoints detected.<br><br>
              <span style="font-size:13px; color:#a0aec0;">Open this deployment URL inside an Incognito tab or alternate device to execute a test link pairing.</span>
            </div>
          `;
        }
      });
    }

    function initiateTargetChat(peer) {
      activePeer = peer;
      document.getElementById('active-chat-tab').textContent = `Chat (${peer.username})`;
      document.getElementById('active-chat-title').textContent = peer.username;
      document.getElementById('active-chat-email').textContent = peer.email;
      
      const avatarBadge = document.getElementById('active-chat-avatar');
      avatarBadge.textContent = peer.username.substring(0,2);
      avatarBadge.style.display = "flex";

      document.getElementById('chat-input').disabled = false;
      document.getElementById('btn-send').disabled = false;

      switchView('chat-view');
    }

    // Global messaging subscription hook pipeline 
    syncChannel.subscribe('msg', (envelope) => {
      const packet = envelope.data;
      if (!localProfile) return;

      let threadKey = null;
      if (packet.senderEmail === localProfile.email) {
        threadKey = packet.recipientEmail;
      } else if (packet.recipientEmail === localProfile.email) {
        threadKey = packet.senderEmail;
      }

      if (threadKey) {
        if (!chatRegistry[threadKey]) chatRegistry[threadKey] = [];
        
        if (!chatRegistry[threadKey].some(m => m.timestamp === packet.timestamp && m.text === packet.text)) {
          chatRegistry[threadKey].push(packet);
          localStorage.setItem('ctw_history', JSON.stringify(chatRegistry));
        }

        if (activePeer && activePeer.email === threadKey) {
          renderChatHistory();
        }
      }
    });

    function renderChatHistory() {
      chatMessages.innerHTML = '';
      if (!activePeer) return;

      const thread = chatRegistry[activePeer.email] || [];
      thread.forEach(msg => {
        const style = (msg.senderEmail === localProfile.email) ? 'sent' : 'received';
        const block = document.createElement('div');
        block.className = `msg-block ${style}`;
        const formatTime = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        block.innerHTML = `
          <div class="msg-text">
            ${escapeHTML(msg.text)}
            <div class="msg-time">${formatTime}</div>
          </div>
        `;
        chatMessages.appendChild(block);
      });
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = chatInput.value.trim();

      if (text && localProfile && activePeer) {
        syncChannel.publish('msg', {
          text: text,
          senderEmail: localProfile.email,
          recipientEmail: activePeer.email,
          timestamp: Date.now()
        });
        chatInput.value = '';
      }
    });

    // View Navigation Handler Switch 
    function switchView(panelId) {
      document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(panelId).classList.add('active');
      
      if(panelId === 'friends-view') document.querySelectorAll('.tab-btn')[0].classList.add('active');
      if(panelId === 'chat-view') document.querySelectorAll('.tab-btn')[1].classList.add('active');
      if(panelId === 'profile-view') document.querySelectorAll('.tab-btn')[2].classList.add('active');

      if (panelId === 'chat-view' && activePeer) {
        renderChatHistory();
      }
    }

    // Storage Management Functions
    function exportChatBackup() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(chatRegistry));
      const anchor = document.createElement('a');
      anchor.setAttribute("href", dataStr);
      anchor.setAttribute("download", `ctw_backup_${Date.now()}.json`);
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
    }

    function importChatBackup(event) {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const parsed = JSON.parse(e.target.result);
          if (typeof parsed === 'object' && parsed !== null) {
            chatRegistry = { ...chatRegistry, ...parsed };
            localStorage.setItem('ctw_history', JSON.stringify(chatRegistry));
            alert("Chat logs unified and loaded successfully!");
            if(activePeer) renderChatHistory();
          }
        } catch(err) {
          alert("Corrupted database layout file target structural mismatch.");
        }
      };
      reader.readAsText(event.target.files[0]);
    }

    function wipeSessionData() {
      localStorage.clear();
      window.location.reload();
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }
  </script>
</body>
</html>
